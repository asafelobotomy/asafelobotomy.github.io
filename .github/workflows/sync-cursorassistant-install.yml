name: Sync cursorAssistant install page

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag on asafelobotomy/cursorassistant"
        required: false
        default: "master"
  repository_dispatch:
    types: [cursorassistant-updated]
  schedule:
    - cron: "0 12 * * 1"
  push:
    paths:
      - ".github/workflows/sync-cursorassistant-install.yml"
      - "scripts/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate install page from upstream
        env:
          CURSOR_ASSISTANT_REF: ${{ github.event.inputs.ref || github.event.client_payload.ref || 'master' }}
        run: bash scripts/sync-cursorassistant-install.sh

      - name: Push to main (auto-publish)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cursorassistant/install/
          if git diff --staged --quiet; then
            echo "No changes to install page."
            exit 0
          fi
          git commit -m "chore: sync cursorAssistant install page from upstream"
          git push
